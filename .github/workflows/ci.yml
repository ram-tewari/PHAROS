name: CI

# Lean, actually-runnable CI. Gates on syntax errors, a torch-free cloud
# boot, the smoke suite, and module isolation (hard gate since Phase 3).

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-smoke:
    name: Lint + Cloud boot + Smoke
    runs-on: ubuntu-latest
    env:
      # Mirror production: cloud process must never need torch.
      MODE: CLOUD
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies (torch-free cloud set)
        run: |
          python -m pip install --upgrade pip
          # requirements-cloud.txt pulls requirements-base.txt (incl. tree-sitter
          # grammars) but deliberately NOT torch / sentence-transformers.
          pip install -r requirements-cloud.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Ruff — syntax errors (blocking)
        # E9 = real syntax breakage (a broken file can't import). Style rules
        # are intentionally not gated yet; add them once the tree is clean.
        run: ruff check app --select E9 --output-format concise

      - name: Ruff — full report (non-blocking)
        continue-on-error: true
        run: ruff check app --output-format concise

      - name: Smoke suite (auth, cloud-boot, polyglot AST)
        # On failure, surface the tail of the output as a workflow annotation
        # so the failure is diagnosable from the public API.
        run: |
          set +e
          pytest tests/smoke -q --tb=long 2>&1 | tee smoke.out
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            tail -c 2000 smoke.out | while IFS= read -r line; do echo "::error::$line"; done
          fi
          exit "$code"

  module-isolation:
    name: Module isolation
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Check module isolation
        # Hard gate since Phase 3: zero cross-module imports allowed.
        run: python scripts/check_module_isolation.py --verbose
